name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'        # Triggers when you push a tag like v1.0.0

permissions:
  contents: write   # Required to create releases and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'   # Or whatever minimum your go.mod requires (you said Go 1.24+)

      - name: Build the EXE
        run: ./build.bat
        shell: cmd

      - name: Create Release and upload EXE
        uses: softprops/action-gh-release@v2
        with:
          files: screenviewer.exe
          generate_release_notes: true   # Optional: auto-generates notes from commits
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
